<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async></script>

  <style>
    /* ── Reset & base ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f4f5f7;
      --surface:     #ffffff;
      --border:      #e5e7eb;
      --text:        #111827;
      --text-soft:   #6b7280;
      --accent:      #1d4ed8;
      --accent-hover:#1e40af;
      --user-bubble: #1d4ed8;
      --user-text:   #ffffff;
      --ai-bubble:   #ffffff;
      --ai-text:     #111827;
      --danger:      #dc2626;
      --shadow:      0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
      --shadow-md:   0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.05);
      --radius:      12px;
      --font:        'Plus Jakarta Sans', sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Login screen ─────────────────────────────────────────────────────── */
    #login-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      animation: fadeIn .4s ease;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow-md);
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .login-icon {
      width: 52px;
      height: 52px;
      background: var(--accent);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-icon svg { width: 26px; height: 26px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .login-card h1 {
      font-size: 1.375rem;
      font-weight: 600;
      letter-spacing: -.02em;
      text-align: center;
      color: var(--text);
    }
    .login-card p {
      font-size: .875rem;
      color: var(--text-soft);
      text-align: center;
      line-height: 1.6;
    }

    #google-signin-btn { width: 100%; }

    .login-note {
      font-size: .75rem;
      color: var(--text-soft);
      text-align: center;
    }

    /* ── App shell (shown after login) ───────────────────────────────────── */
    #app-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #app-screen[hidden] { display: none; }

    /* Header */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .header-icon svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    header h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -.01em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #user-email {
      font-size: .8rem;
      color: var(--text-soft);
      font-weight: 500;
    }

    .btn-ghost {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-family: var(--font);
      font-size: .8rem;
      font-weight: 500;
      color: var(--text-soft);
      cursor: pointer;
      transition: all .15s;
    }
    .btn-ghost:hover { background: var(--bg); color: var(--text); }

    /* Chat area */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    /* Empty state */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-soft);
      pointer-events: none;
      padding: 40px;
      text-align: center;
    }
    #empty-state svg { opacity: .25; width: 40px; height: 40px; stroke: var(--text-soft); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    #empty-state p { font-size: .9rem; font-weight: 500; }
    #empty-state span { font-size: .8rem; opacity: .7; }

    /* Message bubbles */
    .msg {
      display: flex;
      gap: 10px;
      max-width: 720px;
      width: 100%;
      animation: slideUp .2s ease;
    }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .7rem;
      font-weight: 600;
      margin-top: 2px;
    }
    .msg.user .avatar { background: var(--user-bubble); color: #fff; }
    .msg.assistant .avatar { background: #e5e7eb; color: var(--text-soft); }
    .msg.assistant .avatar svg { width: 14px; height: 14px; stroke: var(--text-soft); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: .9rem;
      line-height: 1.65;
      max-width: calc(100% - 44px);
    }
    .msg.user .bubble {
      background: var(--user-bubble);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
    }
    .msg.assistant .bubble {
      background: var(--ai-bubble);
      color: var(--ai-text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow);
    }

    /* Typing indicator */
    .typing-dots {
      display: flex;
      gap: 4px;
      padding: 4px 0;
      align-items: center;
    }
    .typing-dots span {
      width: 6px;
      height: 6px;
      background: var(--text-soft);
      border-radius: 50%;
      animation: bounce .9s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .15s; }
    .typing-dots span:nth-child(3) { animation-delay: .3s; }

    /* Error messages */
    .error-msg {
      align-self: center;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      color: var(--danger);
      font-size: .825rem;
      padding: 10px 16px;
      max-width: 480px;
      text-align: center;
    }

    /* Input bar */
    #input-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 16px;
      flex-shrink: 0;
    }

    .input-wrapper {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 8px 8px 8px 16px;
      transition: border-color .15s, box-shadow .15s;
    }
    .input-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(29,78,216,.1);
    }

    #message-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: var(--font);
      font-size: .9rem;
      color: var(--text);
      resize: none;
      max-height: 160px;
      line-height: 1.5;
      padding: 4px 0;
    }
    #message-input::placeholder { color: var(--text-soft); }

    #send-btn {
      width: 38px;
      height: 38px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .15s, transform .1s;
    }
    #send-btn:hover:not(:disabled) { background: var(--accent-hover); }
    #send-btn:active:not(:disabled) { transform: scale(.94); }
    #send-btn:disabled { opacity: .45; cursor: not-allowed; }
    #send-btn svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    .input-hint {
      text-align: center;
      font-size: .72rem;
      color: var(--text-soft);
      margin-top: 8px;
      opacity: .7;
    }

    /* ── Animations ───────────────────────────────────────────────────────── */
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(8px) } to { opacity: 1; transform: translateY(0) } }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0) }
      30% { transform: translateY(-6px) }
    }

    /* ── Responsive ───────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .login-card { padding: 36px 24px; }
      #user-email { display: none; }
      header { padding: 0 16px; }
      #messages { padding: 16px 12px; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════════ -->
<!--  LOGIN SCREEN                                                          -->
<!-- ═══════════════════════════════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">

    <div class="login-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>

    <div style="display:flex;flex-direction:column;gap:8px;align-items:center">
      <h1>AI Assistant</h1>
      <p>Sign in with your Google account to access the assistant.</p>
    </div>

    <!-- Google renders its button here -->
    <div id="google-signin-btn"></div>

    <p class="login-note">Access is restricted to authorised accounts only.</p>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════ -->
<!--  CHAT APP                                                               -->
<!-- ═══════════════════════════════════════════════════════════════════════ -->
<div id="app-screen" hidden>

  <header>
    <div class="header-left">
      <div class="header-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <h1>AI Assistant</h1>
    </div>
    <div class="header-right">
      <span id="user-email"></span>
      <button class="btn-ghost" onclick="signOut()">Sign out</button>
    </div>
  </header>

  <div id="messages">
    <div id="empty-state">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <p>How can I help you today?</p>
      <span>Type a message below to get started.</span>
    </div>
  </div>

  <div id="input-bar">
    <div class="input-wrapper">
      <textarea
        id="message-input"
        placeholder="Message the assistant…"
        rows="1"
        autocomplete="off"
        spellcheck="true"
      ></textarea>
      <button id="send-btn" onclick="sendMessage()" disabled title="Send message">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <p class="input-hint">Press Enter to send &nbsp;·&nbsp; Shift+Enter for new line</p>
  </div>

</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   CONFIGURATION — update these two values before deploying
   ═══════════════════════════════════════════════════════════════════════════ */
const GOOGLE_CLIENT_ID = '900022008011-mj99tvle3egksvuf37du7i3dmtq0br5p.apps.googleusercontent.com';
const WORKER_URL       = 'https://openai-chat-proxy.metcarob.workers.dev';

/* ═══════════════════════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════════════════════ */
let googleToken       = null;   // Google ID token (refreshed automatically)
let previousResponseId = null;  // OpenAI response ID for conversation continuity
let isStreaming        = false;

/* ═══════════════════════════════════════════════════════════════════════════
   GOOGLE SIGN-IN
   ═══════════════════════════════════════════════════════════════════════════ */
window.onload = function () {
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: onGoogleSignIn,
    auto_select: true,          // silently re-authenticates returning users
    cancel_on_tap_outside: false,
  });

  google.accounts.id.renderButton(
    document.getElementById('google-signin-btn'),
    {
      type:  'standard',
      theme: 'outline',
      size:  'large',
      text:  'signin_with',
      shape: 'rectangular',
      width: 300,
    }
  );
};

function onGoogleSignIn(response) {
  googleToken = response.credential;

  // Decode the JWT payload to get the email (client-side preview only;
  // the Worker re-validates the token properly).
  const payload = JSON.parse(atob(googleToken.split('.')[1]));

  document.getElementById('user-email').textContent = payload.email;
  document.getElementById('login-screen').style.display  = 'none';
  document.getElementById('app-screen').removeAttribute('hidden');
  document.getElementById('message-input').focus();
}

function signOut() {
  google.accounts.id.disableAutoSelect();
  googleToken        = null;
  previousResponseId = null;

  // Clear messages
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  msgs.appendChild(buildEmptyState());

  document.getElementById('app-screen').setAttribute('hidden', '');
  document.getElementById('login-screen').style.display = 'flex';
}

function buildEmptyState() {
  const div = document.createElement('div');
  div.id = 'empty-state';
  div.innerHTML = `
    <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <p>How can I help you today?</p>
    <span>Type a message below to get started.</span>`;
  return div;
}

/* ═══════════════════════════════════════════════════════════════════════════
   TEXTAREA — auto-resize & keyboard shortcut
   ═══════════════════════════════════════════════════════════════════════════ */
const textarea = document.getElementById('message-input');
const sendBtn  = document.getElementById('send-btn');

textarea.addEventListener('input', () => {
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 160) + 'px';
  sendBtn.disabled = textarea.value.trim() === '' || isStreaming;
});

textarea.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) sendMessage();
  }
});

/* ═══════════════════════════════════════════════════════════════════════════
   SEND MESSAGE
   ═══════════════════════════════════════════════════════════════════════════ */
async function sendMessage() {
  const text = textarea.value.trim();
  if (!text || isStreaming) return;

  // Hide empty state
  const emptyState = document.getElementById('empty-state');
  if (emptyState) emptyState.remove();

  // Reset input
  textarea.value = '';
  textarea.style.height = 'auto';
  setStreaming(true);

  // Show user bubble
  appendMessage('user', text);

  // Show typing indicator
  const typingId = appendTypingIndicator();

  try {
    // Refresh Google token if it might be expiring
    if (!googleToken) throw new Error('Not signed in. Please sign in again.');

    const res = await fetch(`${WORKER_URL}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        token: googleToken,
        previousResponseId,
      }),
    });

    removeTypingIndicator(typingId);

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
      // If 401, token expired — prompt re-login
      if (res.status === 401) {
        googleToken = null;
        showError(err.error + ' Redirecting to sign-in…');
        setTimeout(() => signOut(), 2500);
        return;
      }
      throw new Error(err.error || `Request failed (${res.status})`);
    }

    // Parse the SSE stream
    const newResponseId = await streamResponse(res.body);
    if (newResponseId) previousResponseId = newResponseId;

  } catch (err) {
    removeTypingIndicator(typingId);
    showError(err.message || 'Something went wrong. Please try again.');
  } finally {
    setStreaming(false);
  }
}

/* ═══════════════════════════════════════════════════════════════════════════
   SSE STREAM PARSER
   Reads OpenAI Responses API server-sent events and streams text into a bubble.
   ═══════════════════════════════════════════════════════════════════════════ */
async function streamResponse(body) {
  const reader  = body.getReader();
  const decoder = new TextDecoder();
  let buffer    = '';
  let responseId = null;

  // Create an empty assistant bubble to stream into
  const bubble = appendMessage('assistant', '');

  try {
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // Keep any partial line

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') continue;

        let event;
        try { event = JSON.parse(raw); } catch { continue; }

        // Capture the response ID for conversation continuity
        if (event.type === 'response.created') {
          responseId = event.response?.id ?? null;
        }

        // Append streamed text delta to the bubble
        if (event.type === 'response.output_text.delta' && event.delta) {
          bubble.textContent += event.delta;
          scrollToBottom();
        }
      }
    }
  } finally {
    reader.cancel();
  }

  return responseId;
}

/* ═══════════════════════════════════════════════════════════════════════════
   UI HELPERS
   ═══════════════════════════════════════════════════════════════════════════ */
function appendMessage(role, text) {
  const msgs = document.getElementById('messages');

  const wrapper = document.createElement('div');
  wrapper.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  if (role === 'user') {
    avatar.textContent = 'You';
  } else {
    avatar.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>`;
  }

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  // Allow basic whitespace formatting
  bubble.style.whiteSpace = 'pre-wrap';

  wrapper.append(avatar, bubble);
  msgs.appendChild(wrapper);
  scrollToBottom();

  return bubble; // return bubble so we can stream into it
}

let typingCounter = 0;
function appendTypingIndicator() {
  const id = `typing-${++typingCounter}`;
  const msgs = document.getElementById('messages');

  const wrapper = document.createElement('div');
  wrapper.className = 'msg assistant';
  wrapper.id = id;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>`;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;

  wrapper.append(avatar, bubble);
  msgs.appendChild(wrapper);
  scrollToBottom();
  return id;
}

function removeTypingIndicator(id) {
  document.getElementById(id)?.remove();
}

function showError(message) {
  const msgs = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'error-msg';
  el.textContent = message;
  msgs.appendChild(el);
  scrollToBottom();
}

function scrollToBottom() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

function setStreaming(active) {
  isStreaming = active;
  sendBtn.disabled = active || textarea.value.trim() === '';
  textarea.disabled = active;
}
</script>
</body>
</html>
