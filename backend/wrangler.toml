name = "openai-chat-proxy"
main = "worker.js"
compatibility_date = "2025-01-01"

# Optional: set non-secret configuration here
# Secrets (OPENAI_API_KEY, GOOGLE_CLIENT_ID, ALLOWED_EMAILS, ALLOWED_ORIGIN)
# must be set via `wrangler secret put` — never put them in this file.

[vars]
OPENAI_MODEL = "gpt-4o"
SYSTEM_PROMPT = "You are a helpful assistant. Be clear, accurate, and concise."
ADMIN_EMAIL = "rmetcalf9@googlemail.com"

[[kv_namespaces]]
binding = "CHAT_KV"
id = "a6d52d8b993942d1b3e0a3d355adefb2"

# Secrets — set these via `wrangler secret put`, never put values here:
#   OPENAI_API_KEY   (fallback key — used if admin hasn't set one via the UI)
#   GOOGLE_CLIENT_ID
#   ALLOWED_EMAILS
#   ALLOWED_ORIGIN
#   ADMIN_EMAIL
